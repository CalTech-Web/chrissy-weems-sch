<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Chrissy Weems Scholarship</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Arizonia&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">Chrissy Weems Scholarship</a>
      <nav class="main-nav">
        <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about.html">About Chrissy Weems</a></li>
          <li><a href="/contact.html" class="active">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-overlay">
      <h1>Contact Us</h1>
    </div>
  </section>

  <main class="container">
    <section class="content-section">
      <form class="contact-form" id="contact-form">
        <div class="form-group">
          <label for="name">Your Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Your Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
        </div>
        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" rows="8"></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; Chrissy Weems Scholarship. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.querySelector('.menu-toggle').addEventListener('click', function() {
      document.querySelector('.main-nav ul').classList.toggle('open');
    });
  </script>
</body>
</html>
